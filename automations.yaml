- id: reolink_driveway_motion_snapshot
  alias: Reolink Driveway Snapshot bei Erkennung
  description: Speichert ein Bild und sendet eine Nachricht, wenn die Reolink Driveway Kamera Personen oder Fahrzeuge erkennt.
  mode: single
  trigger:
    - platform: state
      entity_id: binary_sensor.driveway_motion
      from: "off"
      to: "on"
      id: motion
    - platform: state
      entity_id: binary_sensor.driveway_person
      from: "off"
      to: "on"
      id: person
    - platform: state
      entity_id: binary_sensor.driveway_vehicle
      from: "off"
      to: "on"
      id: vehicle
  condition:
    - condition: numeric_state
      entity_id: sensor.driveway_battery
      above: 20
    - condition: state
      entity_id: switch.driveway_privacy_mode
      state: "off"
  variables:
    event_type: "{{ trigger.id | default('manual') }}"
    event_label: >
      {{ {'motion': 'Bewegung', 'person': 'Person', 'vehicle': 'Fahrzeug', 'manual': 'Manuell'}[event_type] }}
    snapshot_file: "driveway_{{ event_type }}_{{ now().strftime('%Y%m%d_%H%M%S') }}.jpg"
    snapshot_path: "/config/www/snapshots/{{ snapshot_file }}"
    snapshot_url: "/local/snapshots/{{ snapshot_file }}"
  action:
    - service: camera.snapshot
      target:
        entity_id: camera.driveway_snapshots_clear
      data:
        filename: "{{ snapshot_path }}"
    - delay:
        seconds: 2
    - service: shell_command.generate_snapshot_gallery
    - service: notify.mobile_app_max16
      data:
        title: "Driveway {{ event_label }} erkannt"
        message: "Reolink hat {{ event_label | lower }} erkannt."
        data:
          image: "{{ snapshot_url }}"
          url: "/camera-feeds/snapshots"
          clickAction: "/camera-feeds/snapshots"

- id: reolink_video_gallery_refresh
  alias: Reolink Medien-Galerien aktualisieren
  description: Aktualisiert regelmaessig die Galerien fuer Reolink-Bilder und -Videos vom Synology-Share.
  mode: single
  trigger:
    - platform: time_pattern
      minutes: "/2"
  action:
    - service: shell_command.generate_snapshot_gallery
    - service: shell_command.generate_reolink_video_gallery
