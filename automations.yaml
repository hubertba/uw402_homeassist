- id: reolink_driveway_motion_snapshot
  alias: Reolink Driveway Snapshot bei Erkennung
  description: Speichert ein Bild und sendet eine Nachricht, wenn die Reolink Driveway Kamera Personen oder Fahrzeuge erkennt.
  mode: single
  trigger:
    - platform: state
      entity_id: binary_sensor.driveway_motion
      from: "off"
      to: "on"
      id: motion
    - platform: state
      entity_id: binary_sensor.driveway_person
      from: "off"
      to: "on"
      id: person
    - platform: state
      entity_id: binary_sensor.driveway_vehicle
      from: "off"
      to: "on"
      id: vehicle
  condition:
    - condition: numeric_state
      entity_id: sensor.driveway_battery
      above: 20
    - condition: state
      entity_id: switch.driveway_privacy_mode
      state: "off"
  variables:
    event_type: "{{ trigger.id | default('manual') }}"
    event_label: >
      {{ {'motion': 'Bewegung', 'person': 'Person', 'vehicle': 'Fahrzeug', 'manual': 'Manuell'}[event_type] }}
    snapshot_file: "driveway_{{ event_type }}_{{ now().strftime('%Y%m%d_%H%M%S') }}.jpg"
    snapshot_path: "/config/www/snapshots/{{ snapshot_file }}"
    snapshot_url: "/local/snapshots/{{ snapshot_file }}"
  action:
    - service: camera.snapshot
      target:
        entity_id: camera.driveway_snapshots_clear
      data:
        filename: "{{ snapshot_path }}"
    - delay:
        seconds: 2
    - service: shell_command.generate_snapshot_gallery
    - service: notify.mobile_app_max16
      data:
        title: "Driveway {{ event_label }} erkannt"
        message: "Reolink hat {{ event_label | lower }} erkannt."
        data:
          image: "{{ snapshot_url }}"
          url: "/camera-feeds/snapshots"
          clickAction: "/camera-feeds/snapshots"

- id: reolink_video_gallery_refresh
  alias: Reolink Medien-Galerien aktualisieren
  description: Aktualisiert regelmaessig die Galerien fuer Reolink-Bilder und -Videos vom Synology-Share.
  mode: single
  trigger:
    - platform: time_pattern
      minutes: "/2"
  action:
    - service: shell_command.generate_snapshot_gallery
    - service: shell_command.generate_reolink_video_gallery

- id: imap_driveway_detection_notification
  alias: Driveway E-Mail-Erkennung
  description: Setzt Driveway-Erkennungsstatus und sendet eine Push-Nachricht, wenn eine Reolink-Mail fuer Driveway eintrifft.
  mode: restart
  trigger:
    - platform: event
      event_type: imap_content
  variables:
    imap_subject: >
      {% if trigger is defined and trigger.platform == 'event' %}
        {{ trigger.event.data.subject | default('Neue Reolink-Mail') }}
      {% else %}
        Neue Reolink-Mail
      {% endif %}
    imap_text: >
      {% if trigger is defined and trigger.platform == 'event' %}
        {{ trigger.event.data.text | default('') }}
      {% else %}
        ''
      {% endif %}
    imap_payload: "{{ (imap_subject ~ ' ' ~ imap_text) | lower }}"
    email_has_person: "{{ 'person' in imap_payload or 'human' in imap_payload }}"
    email_has_vehicle: "{{ 'vehicle' in imap_payload or 'car' in imap_payload or 'fahrzeug' in imap_payload }}"
  condition:
    - condition: template
      value_template: >
        {{ 'Detected from Driveway' in imap_subject }}
  action:
    - service: input_boolean.turn_on
      target:
        entity_id: input_boolean.driveway_email_motion
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ email_has_person }}"
          sequence:
            - service: input_boolean.turn_on
              target:
                entity_id: input_boolean.driveway_email_person
        - conditions:
            - condition: template
              value_template: "{{ email_has_vehicle }}"
          sequence:
            - service: input_boolean.turn_on
              target:
                entity_id: input_boolean.driveway_email_vehicle
    - service: notify.mobile_app_max16
      data:
        title: "Driveway erkannt"
        message: >
          {{ imap_subject }}
        data:
          url: "/camera-feeds/videos"
          clickAction: "/camera-feeds/videos"
    - delay:
        minutes: 5
    - service: input_boolean.turn_off
      target:
        entity_id:
          - input_boolean.driveway_email_motion
          - input_boolean.driveway_email_person
          - input_boolean.driveway_email_vehicle
