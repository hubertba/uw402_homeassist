title: Kameras
views:
  - title: Kameras
    path: cameras
    icon: mdi:cctv
    badges: []
    cards:
      - type: grid
        title: Live-Feeds
        columns: 1
        square: false
        cards:
          - type: picture-entity
            entity: camera.carport_eingangstur_live
            name: Eingangstuer live
            camera_view: live
            show_state: true
            show_name: true

      - type: grid
        title: Eingangstuer Snapshots
        columns: 2
        square: false
        cards:
          - type: picture-entity
            entity: camera.carport_eingangstur_last_ring
            name: Eingangstuer letzter Ring
            camera_view: auto
            show_state: true
            show_name: true
          - type: picture-entity
            entity: camera.carport_eingangstur_last_motion
            name: Eingangstuer letzte Bewegung
            camera_view: auto
            show_state: true
            show_name: true

      - type: grid
        title: Reolink Snapshots
        columns: 1
        square: false
        cards:
          - type: picture-entity
            entity: camera.driveway_snapshots_fluent
            name: Driveway Snapshot fluent
            camera_view: auto
            show_state: true
            show_name: true
          - type: picture-entity
            entity: camera.driveway_snapshots_clear
            name: Driveway Snapshot clear
            camera_view: auto
            show_state: true
            show_name: true

      - type: entities
        title: Driveway Status
        show_header_toggle: false
        entities:
          - entity: automation.reolink_driveway_snapshot_bei_bewegung
            name: Snapshot-Automation
          - entity: binary_sensor.driveway_motion
            name: Bewegung
          - entity: binary_sensor.driveway_person
            name: Person
          - entity: binary_sensor.driveway_vehicle
            name: Fahrzeug
          - entity: binary_sensor.driveway_pet
            name: Tier
          - entity: sensor.driveway_battery
            name: Batterie
          - entity: switch.driveway_privacy_mode
            name: Privatsphaere
          - entity: light.driveway_floodlight
            name: Flutlicht

      - type: history-graph
        title: Driveway Erkennung
        hours_to_show: 24
        entities:
          - entity: binary_sensor.driveway_person
            name: Person
          - entity: binary_sensor.driveway_vehicle
            name: Fahrzeug
          - entity: binary_sensor.driveway_motion
            name: Bewegung

      - type: entities
        title: IMAP Inbox
        show_header_toggle: false
        entities:
          - entity: sensor.imap_homeassist_chilicode_com_messages
            name: Ungelesene Mails
          - entity: automation.imap_push_bei_driveway_erkennung
            name: Push bei Driveway-Mail

  - title: Bewegungsbilder
    path: snapshots
    icon: mdi:image-multiple
    panel: true
    badges: []
    cards:
      - type: iframe
        title: Reolink Bewegungsbilder
        url: /local/snapshots/index.html?v=reolink-cache-3
        aspect_ratio: 160%

  - title: Videos
    path: videos
    icon: mdi:video
    panel: true
    badges: []
    cards:
      - type: iframe
        title: Reolink Videos
        url: /local/reolink-video-gallery/index.html?v=reolink-cache-3
        aspect_ratio: 160%
